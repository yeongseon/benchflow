name: driver-compare-insert
description: >
  Single-row INSERT throughput — pycubrid vs CUBRIDdb (same CUBRID instance).
  Measures write path overhead including commit latency.

setup:
  queries:
    - DROP TABLE IF EXISTS bench_insert
    - >
      CREATE TABLE bench_insert (
        id INT AUTO_INCREMENT PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        amount INT NOT NULL
      )

teardown:
  queries:
    - DROP TABLE IF EXISTS bench_insert

steps:
  - name: insert-one-row
    query: INSERT INTO bench_insert (name, amount) VALUES (%(name)s, %(amount)s)
    params:
      name: random_choice('Alice','Bob','Charlie','Diana','Eve','Frank','Grace','Hank')
      amount: random_int(1, 10000)

load:
  concurrency: 1
  duration: 30
  warmup:
    duration: 5

experiment:
  iterations: 5
  seed: 42
  pause_between: 2.0

targets:
  - name: pycubrid
    stack_id: python+pycubrid
    driver: pycubrid
    dsn: cubrid://dba:@localhost:33000/benchdb
  - name: cubriddb
    stack_id: python+cubriddb
    driver: cubriddb
    dsn: cubrid://dba:@localhost:33000/benchdb
