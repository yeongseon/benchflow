teardown:
  queries:
    - DROP TABLE IF EXISTS bench_modify

steps:
  - name: update-row
    query: UPDATE bench_modify SET amount = %(amount)s WHERE id = %(id)s
    params:
      id: random_int(1, 50)
      amount: random_int(1, 10000)

load:
  concurrency: 1
  duration: 30
  warmup:
    duration: 5

experiment:
  iterations: 5
  seed: 42
  pause_between: 2.0

targets:
  - name: pycubrid
    stack_id: python+pycubrid
    driver: pycubrid
    dsn: cubrid://dba:@localhost:33000/benchdb
  - name: cubriddb
    stack_id: python+cubriddb
    driver: cubriddb
    dsn: cubrid://dba:@localhost:33000/benchdb
