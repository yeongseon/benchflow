# ============================================================================
# INSERT Sequential — Single-row INSERT throughput
# ============================================================================
# Measures INSERT performance for sequential row insertion.
# What to look for:
#   - pycubrid vs PyMySQL throughput ratio
#   - Latency percentiles (p50, p95, p99)
# ============================================================================

name: cubrid-mysql-insert-sequential
description: >
  Single-row INSERT throughput — CUBRID (pycubrid) vs MySQL (PyMySQL).
  Replicates cubrid-benchmark Tier 1 bench_insert_10k_sequential.

setup:
  queries:
    - DROP TABLE IF EXISTS bench_insert
    - >
      CREATE TABLE bench_insert (
        id INT AUTO_INCREMENT PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        amount INT NOT NULL
      )

teardown:
  queries:
    - DROP TABLE IF EXISTS bench_insert

steps:
  - name: insert-one-row
    query: INSERT INTO bench_insert (name, amount) VALUES (%(name)s, %(amount)s)
    params:
      name: random_choice('Alice','Bob','Charlie','Diana','Eve','Frank','Grace','Hank')
      amount: random_int(1, 10000)

load:
  concurrency: 1
  duration: 30
  warmup:
    duration: 3

experiment:
  iterations: 5
  seed: 42
  pause_between: 2.0

targets:
  - name: pycubrid
    stack_id: python+pycubrid
    driver: pycubrid
    dsn: cubrid://dba:@localhost:33000/benchdb
  - name: pymysql
    stack_id: python+pymysql
    driver: pymysql
    dsn: mysql://root:bench@localhost:3306/benchdb
