    query: SELECT * FROM bench_full_scan

load:
  concurrency: 1
  duration: 30
  warmup:
    duration: 5

experiment:
  iterations: 5
  seed: 42
  pause_between: 2.0

targets:
  - name: pycubrid
    stack_id: python+pycubrid
    driver: pycubrid
    dsn: cubrid://dba:@localhost:33000/benchdb
  - name: cubriddb
    stack_id: python+cubriddb
    driver: cubriddb
    dsn: cubrid://dba:@localhost:33000/benchdb
